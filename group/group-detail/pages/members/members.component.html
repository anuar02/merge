<div class="members-container">
    <!-- Header Section -->
    <div class="members-header">
        <div class="members-header__title-section">
            <h2 class="members-header__title">
<!--                {{ 'members.title' | transloco }}: {{ totalMembers() }}-->
                {{ 'members.title' | transloco }}: 20
            </h2>
        </div>

        <div class="members-header__actions">
            <!-- Select All Checkbox -->
            <button 
                class="button button--secondary button--icon-only"
                [class.button--active]="selectAll"
                (click)="toggleSelectAll()"
            >
                <app-svg-icon 
                    [icon]="selectAll ? 'icon-check-square' : 'icon-square'"
                ></app-svg-icon>
            </button>

            <!-- View Toggle Buttons -->
            <div class="button-group">
                <button 
                    class="button button--secondary button--icon-only"
                    [class.button--active]="selectedView === 'table'"
                    (click)="toggleView('table')"
                >
                    <app-svg-icon [icon]="'icon-table'"></app-svg-icon>
                </button>
                <button 
                    class="button button--secondary button--icon-only"
                    [class.button--active]="selectedView === 'cards'"
                    (click)="toggleView('cards')"
                >
                    <app-svg-icon [icon]="'icon-grid'"></app-svg-icon>
                </button>
            </div>

            <!-- Search Input -->
            <div class="search-input">
                <app-svg-icon [icon]="'icon-search'"></app-svg-icon>
                <input 
                    type="text"
                    [formControl]="searchControl"
                    [placeholder]="'common.search' | transloco"
                    (input)="onSearch()"
                >
            </div>

            <!-- Sort Button -->
            <button 
                class="button button--secondary button--icon-only"
                (click)="onSortClick()"
            >
                <app-svg-icon [icon]="'icon-sort'"></app-svg-icon>
            </button>

            <!-- Filter Button -->
            <button 
                class="button button--secondary button--icon-only"
                (click)="onFilterClick()"
            >
                <app-svg-icon [icon]="'icon-filter'"></app-svg-icon>
            </button>
        </div>
    </div>

    <!-- Members List -->
    <div class="members-content">
        @if (isLoading()) {
            <div class="members-loading">
                {{ 'common.loading' | transloco }}...
            </div>
        } @else if (members().length === 0) {
            <div class="members-empty">
                {{ 'members.noMembers' | transloco }}
            </div>
        } @else {
            <div class="members-list">
                @for (member of members(); track member.id) {
                    <app-member-card
                        [member]="member"
                        (cardClick)="onMemberCardClick($event)"
                        (infoClick)="onMemberInfoClick($event)"
                        (moreClick)="onMemberMoreClick($event)"
                    ></app-member-card>
                }
            </div>
        }
    </div>

    <!-- Pagination will be handled by app-base-pageable-list wrapper -->
</div>
